project: FUCKYOU_DEREK
description: >
  Structured evidence database of the Derek & Merry situation, built for the
  public website and for chunked AI ingestion (Google AI Studio). Every claim
  is tagged by evidence class: whatsapp_log (hard receipt), screenshot (hard
  receipt), user_testimony (sworn, unverifiable), report (third-party AI analysis).
version: "1.0"
compiled: "2026-07-20"

subjects:
  archivist: Merry (whatsapp export holder, testimony source)
  subject: Derek Vasilakis
  third_party: Jay (testimony only, no logs)

evidence_gaps:
  - period: "2025-01-26 to 2025-11-05"
    note: "First ~10 months missing. Survives only as testimony + reports."
  - note: "Export and screenshots agree line-for-line in the overlap (Dec 12, 2025)."

