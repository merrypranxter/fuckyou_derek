files:
  navigation:
    - path: README.md
      desc: "Repo overview, ID system, ingestion order, evidence-status legend"
    - path: 00_ARCHITECTURE.md
      desc: "7-module master plan + file format spec (cratak plan, adopted)"
    - path: TIMELINE.md
      desc: "Master chronology Jan 2025 – May 2026, every entry cited"
  narrative_modules:
    dir: modules/
    count: 7
  whatsapp_logs:
    - path: evidence/whatsapp/chat_index_01.csv
      desc: "Message index part 1 (WA-0001–~WA-0702): id, datetime, speaker, type, source, text"
    - path: evidence/whatsapp/chat_index_02.csv
      desc: "Message index part 2"
    - path: evidence/whatsapp/chat_index_03.csv
      desc: "Message index part 3 (ends WA-2105). Parts share the header row; concatenate for full 2105-row index."
    - path: evidence/whatsapp/log_2025-11.md
      ids: "WA-0001–WA-0067"
    - path: evidence/whatsapp/log_2025-12.md
      ids: "WA-0068–WA-1166"
    - path: evidence/whatsapp/log_2026-01.md
      ids: "WA-1167–WA-1615"
    - path: evidence/whatsapp/log_2026-02.md
      ids: "WA-1616–WA-1980"
    - path: evidence/whatsapp/log_2026-05.md
      ids: "WA-1981–WA-2105 (the reunion)"
  screenshots:
    - path: evidence/screenshots/DEREK6_SCREENSHOT_INDEX.md
      desc: "28-page dossier index: SC-01–SC-28, key quotes, module refs, verification status"
      keystone: SC-28
  transcripts:
    - path: evidence/transcripts/VOICENOTE_DEREK1.md
      desc: "Voice note transcription (verbatim)"
  reports:
    - path: reports/FORENSIC_AUDIT_DOSSIER.md
      desc: "Case #001-D-V: integrity scoreboard, testimony data log (verbatim)"
    - path: reports/FORENSIC_PATTERN_ANALYSIS.md
      desc: "Pattern analysis incl. Feb 15-16 'perspective guy' session (verbatim)"
    - path: reports/HONESTY_VS_SINCERITY.md
      desc: "Honesty-vs-sincerity split in Derek's defense (verbatim)"

ingestion_order_for_ai_studio:
  - "00_MASTER_INDEX.yaml + 00_ARCHITECTURE.md (the map)"
  - "TIMELINE.md (the spine)"
  - "modules/*.md one at a time (narrative + cited evidence)"
  - "evidence/whatsapp/log_YYYY-MM.md only when full context needed"
  - "reports/*.md (third-party audits)"
  - "evidence/screenshots/DEREK6_SCREENSHOT_INDEX.md (visual receipts)"

id_system:
  whatsapp: "WA-0001 … WA-2105 (permanent, chronological across both exports)"
  screenshots: "SC-01 … SC-28 (Derek6.pdf page order)"
  lookup: "keyword → chat_index_*.csv → WA-ID → monthly log or module citation"
