project: FUCKYOU_DEREK
description: >
  Structured evidence database of the Derek & Merry situation, built for the
  public website and for chunked AI ingestion (Google AI Studio). Every claim
  is tagged by evidence class: whatsapp_log (hard receipt), screenshot (hard
  receipt), user_testimony (sworn, unverifiable), report (third-party AI analysis).
version: "1.0"
compiled: "2026-07-20"

subjects:
  archivist: Merry (whatsapp export holder, testimony source)
  subject: Derek Vasilakis
  third_party: Jay (testimony only, no logs)

evidence_gaps:
  - period: "2025-01-26 to 2025-11-05"
    note: "First ~10 months missing. Survives only as testimony + reports."
  - note: "Export and screenshots agree line-for-line in the overlap (Dec 12, 2025)."

statistics:
  total_messages: 2105
  merry_messages: 1726
  derek_messages: 379
  derek_share: "18.0%"
  main_span: "2025-11-05 to 2026-02-16 (104 days)"
  derek_active_days: 38
  longest_silence_days: 28
  call_events_logged: 113
  keystone_facts:
    - id: WA-1494
      fact: "55-minute video call on 2026-01-22 after a year of 'complex' impossibility claims"
    - id: WA-0560
      fact: "'It will happen when it doesn't feel like this. Period' — promise dissolved into mood condition"
    - id: WA-1879
      fact: "'I'm wrong 100%' — past-tense-only confession"
    - id: WA-1885
      fact: "Present and future tense declared 'up for grabs in the guilt game'"
    - id: WA-2094
      fact: "Archive ends on a system line; 24-hour apology deadline expired unanswered"

